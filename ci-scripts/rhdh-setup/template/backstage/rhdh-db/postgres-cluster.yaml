apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: rhdh-postgresql-cluster
spec:
  openshift: true
  postgresVersion: 18
  patroni:
    dynamicConfiguration:
      postgresql:
        parameters:
          max_connections: "${RHDH_DB_MAX_CONNECTIONS}"
  instances:
    - name: primary
      replicas: ${RHDH_DB_REPLICAS}
      dataVolumeClaimSpec:
        accessModes:
          - "ReadWriteOnce"
        resources:
          requests:
            storage: ${RHDH_DB_STORAGE}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    postgres-operator.crunchydata.com/cluster: rhdh-postgresql-cluster
                    postgres-operator.crunchydata.com/instance-set: primary
  backups:
    pgbackrest:
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              accessModes:
                - "ReadWriteOnce"
              resources:
                requests:
                  storage: ${RHDH_DB_STORAGE}
  proxy:
    pgBouncer:
      replicas: ${PGBOUNCER_REPLICAS}
      config:
        global:
          max_client_conn: "${PGBOUNCER_MAX_CLIENT_CONNECTIONS}"
          max_user_connections: "${PGBOUNCER_MAX_USER_CONNECTIONS}"
          max_db_connections: "${PGBOUNCER_MAX_DB_CONNECTIONS}"
          default_pool_size: "${PGBOUNCER_DEFAULT_POOL_SIZE}"
          reserve_pool_size: "5"
          reserve_pool_timeout: "3"
          ignore_startup_parameters: "extra_float_digits,search_path"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    postgres-operator.crunchydata.com/cluster: rhdh-postgresql-cluster
                    postgres-operator.crunchydata.com/role: pgbouncer
