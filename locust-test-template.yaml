apiVersion: locust.io/v2
kind: LocustTest
metadata:
  name: ${SCENARIO}.test
spec:
  image: quay.io/backstage-performance/locust:latest-2.x
  imagePullPolicy: Always
  master:
    command: >-
      --locustfile /lotest/src/${SCENARIO}.py
      --host ${BASE_HOST}
      --users ${USERS}
      --spawn-rate ${SPAWN_RATE}
      --run-time ${DURATION}
      ${LOCUST_EXTRA_CMD}
  worker:
    command: >-
      --locustfile /lotest/src/${SCENARIO}.py
      ${LOCUST_EXTRA_CMD}
    replicas: ${WORKERS}
  testFiles:
    configMapRef: locust.${SCENARIO}