image:
  repository: "quay.io/backstage-performance/locust-k8s-operator"
  tag: "latest-2.x"
  pullPolicy: Always

# OpenShift-compatible security context - let OpenShift assign UIDs from namespace range
podSecurityContext:
  runAsNonRoot: true
  runAsUser: null
  runAsGroup: null
  fsGroup: null
  seccompProfile:
    type: RuntimeDefault

k8s:
  clusterRole:
    enabled: true

config:
  loadGenerationPods:
    resource:
      cpuRequest: 250m
      memRequest: 256Mi
      ephemeralRequest: 30Mi
      cpuLimit: 250m
      memLimit: 256Mi
      ephemeralLimit: 100Mi
    metricsExporter:
      image: "quay.io/backstage-performance/locust_exporter:latest-2.x"
      pullPolicy: Always

serviceAccount:
  name: ${LOCUST_NAMESPACE}-locust-k8s-operator
